<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>صيصان امروك الاماني حجم جابو – Al Wafia Farm</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Tajawal", Arial, sans-serif;
    background: #e3edf6;
    color: #1f2a37;
    direction: rtl;
    text-align: right;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  h1 {
    color: #00695c;
    margin: 10px 0;
  }

  .back-btn {
    display: inline-block;
    background: #4caf50;
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .gallery-item {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    transition: transform 0.2s;
  }

  .gallery-item:hover {
    transform: translateY(-6px);
  }

  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  .info {
    padding: 16px;
    text-align: center;
  }

  .name {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 8px;
  }

  .price {
    color: #e74c3c;
    font-size: 16px;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <h1>صيصان امروك الاماني حجم جابو</h1>
  <p style="color:#555; margin-top:8px;">العمر: شهر | السعر: 50 درهم</p>
</header>

<div class="gallery">

  <!-- Main photo -->
  <div class="gallery-item">
    <img src="sh1.jpg" alt="صيصان امروك الاماني">
    <div class="info">
      <div class="name">النوع الأساسي</div>
      <div class="price">50 درهم</div>
    </div>
  </div>

  <!-- Add as many more photos as you have -->
  <!-- Example placeholders – replace src with real file names -->
  <div class="gallery-item">
    <img src="sh2.jpg" alt="صيصان نوع 2">
    <div class="info">
      <div class="name">صيصان أبيض ناصع</div>
      <div class="price">50 درهم</div>
    </div>
  </div>

  <div class="gallery-item">
    <img src="sh3.jpg" alt="صيصان نوع 3">
    <div class="info">
      <div class="name">صيصان مخطط</div>
      <div class="price">50 درهم</div>
    </div>
  </div>

  <div class="gallery-item">
    <img src="sh4.jpg" alt="صيصان نوع 4">
    <div class="info">
      <div class="name">صيصان ذهبي</div>
      <div class="price">50 درهم</div>
    </div>
  </div>

  <!-- Keep adding more <div class="gallery-item"> ... </div> as needed -->

</div>

</body>
</html>
