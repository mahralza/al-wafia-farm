<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Al Wafia Farm</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #e3edf6;
  --card: #e3edf6;
  --border: #cfdbe8;
  --divider: #b2c4d6;
  --text: #1f2a37;
  --muted: #5b6b7b;
  --shadow: 0 10px 22px rgba(0,0,0,.07);
  --shadow2: 0 14px 30px rgba(0,0,0,.10);
  --radius: 18px;
  --radius2: 14px;
  --wa: #25D366;
  --chip: #0f2a44;
  --green: #00695c;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: "Tajawal", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  text-align: right;
  padding-top: 64px;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 999;
  background: rgba(227,237,246,.92);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--divider);
}
.topbar-inner {
  max-width: 980px;
  margin: 0 auto;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 18px;
  color: var(--text);
  white-space: nowrap;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 999px;
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(0,105,92,.08);
}
.top-actions { display: flex; align-items: center; gap: 10px; }
.wa-btn {
  background: var(--wa);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 10px 14px;
  font-weight: 700;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow);
  white-space: nowrap;
}
.wa-btn span {
  width: 10px; height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.8);
}

/* Click-to-call in topbar */
.call-btn {
  background: #4caf50;
  color: white;
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 15px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 12px rgba(76,175,80,0.3);
  white-space: nowrap;
  transition: transform 0.15s;
}
.call-btn:hover {
  transform: translateY(-1px);
}
.call-btn svg {
  width: 18px;
  height: 18px;
  stroke: white;
}

header {
  max-width: 980px;
  margin: 0 auto;
  padding: 16px 14px 10px;
}
.logo {
  width: 100%;
  max-width: 1135px;
  display: block;
  margin: 0 auto 12px;
  object-fit: contain;
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,.06);
  box-shadow: var(--shadow);
}
header h1 {
  margin: 0;
  font-size: 32px;
  font-weight: 700;
  text-align: center;
  color: var(--green);
}

/* Bubble nav */
.nav-bubbles {
  margin: 12px auto 0;
  max-width: 900px;
  display: flex;
  justify-content: flex-start;
  gap: 8px;
  padding: 0 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.nav-bubbles::-webkit-scrollbar { height: 6px; }
.nav-bubbles::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 999px; }
.nav-bubbles::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 999px; }

.nav-bubbles a {
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 7px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 13px;
  color: var(--chip);
  background: rgba(0,105,92,.08);
  border: 1px solid rgba(0,0,0,.08);
  box-shadow: 0 6px 14px rgba(0,0,0,.06);
  white-space: nowrap;
  flex: 0 0 auto;
  transition: transform .15s ease, background .15s ease;
}
.nav-bubbles a:hover {
  transform: translateY(-1px);
  background: rgba(0,105,92,.14);
}

.section {
  max-width: 980px;
  margin: 0 auto;
  padding: 22px 14px 24px;
  scroll-margin-top: 80px;
}
.section + .section {
  border-top: 3px solid var(--divider);
}

.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.title-wrap { display: flex; align-items: center; gap: 10px; }
.icon-badge {
  width: 34px; height: 34px;
  border-radius: 12px;
  background: rgba(0,105,92,.08);
  border: 1px solid rgba(0,0,0,.06);
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}
.icon-badge svg { width: 18px; height: 18px; opacity: .8; }
h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  border-bottom: 1px solid rgba(0,0,0,.08);
  padding-bottom: 6px;
  display: inline-block;
}
.hint { font-size: 12px; color: var(--muted); white-space: nowrap; opacity: .95; }

.row {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(230px, 1fr);
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 6px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.row::-webkit-scrollbar { height: 8px; }
.row::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 999px; }
.row::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 999px; }

.card {
  scroll-snap-align: start;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: var(--radius);
  padding: 10px;
  box-shadow: var(--shadow);
  transition: transform .18s ease, box-shadow .18s ease;
}
@media (hover:hover) {
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow2); }
}
.card a { color: inherit; text-decoration: none; display: block; }

.img-wrap {
  border-radius: var(--radius2);
  overflow: hidden;
  border: 1px solid rgba(0,0,0,.06);
  background: linear-gradient(135deg, rgba(255,255,255,.35), rgba(0,105,92,.04));
  padding: 10px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
}
.card img {
  width: 100%;
  height: 320px;
  object-fit: contain;
  background: transparent;
  display: block;
  border-radius: 12px;
}

.name { margin: 10px 0 4px; font-weight: 700; font-size: 15px; }
.price { margin: 0; font-size: 13px; color: #415364; font-weight: 500; }
.view-btn {
  margin-top: 10px;
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 10px 12px;
  font-weight: 700;
  background: rgba(0,105,92,.10);
  color: var(--text);
  cursor: pointer;
}
.no-price .price { display: none; }
.no-price .name { margin-bottom: 0; }

footer {
  text-align: center;
  padding: 14px 10px 18px;
  color: #6b7b8c;
  font-size: 13px;
  border-top: 3px solid var(--divider);
  margin-top: 10px;
}

/* Floating social bubbles – LEFT side */
.social-bubbles {
  position: fixed;
  left: 16px;
  top: 92px;
  z-index: 1200;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bubble {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow2);
  border: 1px solid rgba(255,255,255,.16);
  text-decoration: none;
  transition: transform .18s ease, opacity .18s ease;
  opacity: .98;
  backdrop-filter: blur(8px);
}
.bubble:hover { transform: translateY(-2px); }
.bubble svg { width: 26px; height: 26px; fill: #fff; }
.bubble.wa { background: #25D366; }
.bubble.ig { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }

.bubble-label {
  position: absolute;
  left: 64px;
  background: rgba(15,42,68,.92);
  color: #fff;
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 12px;
  white-space: nowrap;
  opacity: 0;
  transform: translateX(-6px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
  box-shadow: var(--shadow);
}
.bubble-wrap { position: relative; }
.bubble-wrap:hover .bubble-label {
  opacity: 1;
  transform: translateX(0);
}

@media (max-width: 520px) {
  .bubble-label { display: none; }
  .social-bubbles { top: 88px; left: 12px; }
  .bubble { width: 48px; height: 48px; border-radius: 16px; }
  .bubble svg { width: 24px; height: 24px; }
  .call-btn { font-size: 14px; padding: 7px 12px; }
}

@media (min-width: 980px) {
  .row { grid-auto-columns: minmax(270px, 1fr); }
  .card img { height: 360px; }
}
</style>
</head>
