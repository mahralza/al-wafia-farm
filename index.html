<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Al Wafia Farm</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right, #e0f7fa, #ffffff);
    text-align:center;
    margin:0;
}

/* LOGO */
.logo{
    width:300px;
    height:120px;
    object-fit:cover;
    margin-top:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* TITLE */
h1{
    margin-top:20px;
    color:#00695c;
    font-size:42px;
}

/* AD BANNERS */
.ad{
    margin:20px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    background:#c8e6c9;
    color:#2e7d32;
    font-weight:bold;
}

/* Sizes */
.leaderboard{
    width:728px;
    height:90px;
}

.rectangle{
    width:300px;
    height:250px;
}

.mobile{
    width:320px;
    height:100px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:40px;
}

/* BOXES */
.box{
    background:white;
    padding:30px;
    border-radius:20px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
    cursor:pointer;
}

.box:hover{
    transform:scale(1.07);
    background:#e0f2f1;
}

/* MOBILE FIX */
@media(max-width:768px){
    .leaderboard{
        display:none;
    }
}
</style>

</head>

<body>

<!-- LOGO -->
<img src="logo.jpg" class="logo">

<h1>Al Wafia Farm</h1>

<!-- TOP BANNER -->
<div class="ad leaderboard">728 x 90 Banner</div>

<div class="container">

<div class="box">اغنام</div>
<div class="box">ابقار</div>
<div class="box">دواجن</div>
<div class="box">ادويه + اجهزة</div>

</div>

<!-- SIDE / CENTER RECTANGLE -->
<div class="ad rectangle">300 x 250 Ad</div>

<!-- MOBILE BANNER -->
<div class="ad mobile">320 x 100 Mobile Banner</div>

</body>
</html>
