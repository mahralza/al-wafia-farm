<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Al Wafia Farm</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right, #e0f7fa, #ffffff);
    text-align:center;
    margin:0;
}

h1{
    margin-top:40px;
    color:#00695c;
    font-size:42px;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:40px;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
    cursor:pointer;
}

.box:hover{
    transform:scale(1.07);
    background:#e0f2f1;
}
</style>

</head>

<body>

<h1>Al Wafia Farm</h1>

<div class="container">

<div class="box">اغنام </div>

<div class="box">ابقار </div>

<div class="box">دواجن </div>

<div class="box">ادويه + اجهزة </div>

</div>

</body>
</html>
